name: Build and Push OmniFlux API

on:
  push:
    branches:
      - main  # (Ubah ke 'master' jika branch utama Anda bernama master)
    paths:
      - 'apps/api/**' # Perintah ini hanya akan jalan jika ada kode API yang diubah

jobs:
  build-and-push:
    runs-on: ubuntu-latest # Menggunakan server Ubuntu AMD64 asli milik GitHub

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile
          push: true
          tags: ryokf/omniflux-api:latest
          platforms: linux/amd64